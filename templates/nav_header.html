<nav class="navbar">
    <div class="navbar-inner">
        <a href="{{ url_for('index') }}"
           class="nav-home-btn {% if request.endpoint == 'index' %}active{% endif %}"
           title="Home"
           aria-label="Home">
            <i data-lucide="house"></i>
        </a>

        <ul class="nav-links">
            {% if grind %}
                <li>
                    <a href="{{ url_for('champion_pool', grind_id=grind.grind_id) }}"
                       class="{% if request.endpoint == 'champion_pool' %}active{% endif %}">
                        Champion Pool
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('view_grind', grind_id=grind.grind_id) }}"
                       class="{% if request.endpoint == 'view_grind' %}active{% endif %}">
                        Match History
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('view_goals', grind_id=grind.grind_id) }}"
                       class="{% if request.endpoint == 'view_goals' %}active{% endif %}">
                        Goals
                    </a>
                </li>
            {% else %}
                <li>
                    <a href="{{ url_for('create_grind') }}"
                       class="{% if request.endpoint == 'create_grind' %}active{% endif %}">
                        Start New Grind
                    </a>
                </li>
            {% endif %}
        </ul>

        <div class="theme-toggle">
            <button type="button" class="theme-btn" onclick="toggleThemePopover()" title="Change theme" aria-label="Change theme">
                <i data-lucide="palette"></i>
            </button>
            <div class="theme-popover hidden" id="themePopover">
                <button type="button" class="theme-option {% if theme == 'summoners-rift' %}active{% endif %}" data-theme="summoners-rift" onclick="setTheme('summoners-rift')">
                    <span class="theme-swatch summoners-rift"></span>
                    <span class="theme-option-label">Summoner's Rift</span>
                    <span class="theme-check"><i data-lucide="check"></i></span>
                </button>
                <button type="button" class="theme-option {% if theme == 'spirit-blossom' %}active{% endif %}" data-theme="spirit-blossom" onclick="setTheme('spirit-blossom')">
                    <span class="theme-swatch spirit-blossom"></span>
                    <span class="theme-option-label">Spirit Blossom</span>
                    <span class="theme-check"><i data-lucide="check"></i></span>
                </button>
                <button type="button" class="theme-option {% if theme == 'darkin' %}active{% endif %}" data-theme="darkin" onclick="setTheme('darkin')">
                    <span class="theme-swatch darkin"></span>
                    <span class="theme-option-label">Darkin</span>
                    <span class="theme-check"><i data-lucide="check"></i></span>
                </button>
            </div>
        </div>
    </div>
</nav>
