<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
    <meta charset="UTF-8">
    <title>League Improvement Journal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
{% if show_navbar != False %}
    {% include 'nav_header.html' %}
{% endif %}

{% block theme_toggle_index %}{% endblock %}

<main>
    {% block content %}

    {% endblock %}
</main>
{% block scripts %}
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            lucide.createIcons();
        });

        function toggleThemePopover() {
            const popover = document.getElementById('themePopover');
            if (popover) popover.classList.toggle('hidden');
        }

        document.addEventListener('click', function (e) {
            const toggle = document.querySelector('.theme-toggle');
            if (toggle && !toggle.contains(e.target)) {
                const popover = document.getElementById('themePopover');
                if (popover && !popover.classList.contains('hidden')) {
                    popover.classList.add('hidden');
                }
            }
        });

        async function setTheme(theme) {
            try {
                const resp = await fetch('/api/theme', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({theme: theme})
                });
                const data = await resp.json();
                if (data.success) {
                    document.documentElement.setAttribute('data-theme', theme);
                    const popover = document.getElementById('themePopover');
                    if (popover) popover.classList.add('hidden');
                    document.querySelectorAll('.theme-option').forEach(function (opt) {
                        opt.classList.toggle('active', opt.dataset.theme === theme);
                    });
                }
            } catch (e) {
                console.error('Failed to set theme:', e);
            }
        }
    </script>
{% endblock %}
</body>
</html>
